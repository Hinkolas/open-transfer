<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>%sveltekit.status% — OpenTransfer</title>
		<style>
			body {
				margin: 0;
				min-height: 100svh;
				display: grid;
				place-items: center;
				background: #f1f2ef;
				color: #1c2733;
				font-family: ui-sans-serif, system-ui, sans-serif;
				border-top: 6px solid #c2362b;
			}
			main {
				text-align: center;
				padding: 1.5rem;
			}
			p.code {
				font-family: ui-monospace, monospace;
				font-size: 0.6875rem;
				letter-spacing: 0.16em;
				color: #5c6672;
			}
			h1 {
				font-size: 1.75rem;
				letter-spacing: -0.02em;
				margin: 0.75rem 0 0;
			}
			a {
				display: inline-block;
				margin-top: 1.5rem;
				color: #2c5697;
				font-weight: 500;
			}
		</style>
	</head>
	<body>
		<main>
			<p class="code">OPENTRANSFER · %sveltekit.status%</p>
			<h1>%sveltekit.error.message%</h1>
			<a href="/">Send a file</a>
		</main>
	</body>
</html>
